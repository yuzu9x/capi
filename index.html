<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Between</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; }
canvas { display:block; image-rendering:pixelated; }

#overlay {
  position:fixed; inset:0;
  pointer-events:none; z-index:5;
}

#title {
  position:fixed; top:32px; left:50%;
  transform:translateX(-50%);
  color:rgba(180,210,255,.72);
  font:11px/1 'Courier New',monospace;
  letter-spacing:.5em; text-transform:uppercase;
  pointer-events:none; transition:opacity 1.6s;
  white-space:nowrap;
}

#hint {
  position:fixed; bottom:22px; left:50%;
  transform:translateX(-50%);
  color:rgba(180,210,255,.28);
  font:9px/1 'Courier New',monospace;
  letter-spacing:.22em; text-transform:uppercase;
  pointer-events:none;
}

#fade {
  position:fixed; inset:0; background:#000;
  opacity:0; pointer-events:none; z-index:20;
  transition:opacity .7s;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="overlay"></canvas>
<div id="title"></div>
<div id="hint">WASD · walk into a portal</div>
<div id="fade"></div>

<script>
'use strict';

// ── GL SETUP ────────────────────────────────────────────────────────
const canvas  = document.getElementById('c');
const overlay = document.getElementById('overlay');
const oc      = overlay.getContext('2d');
const gl      = canvas.getContext('webgl', { antialias:false });
const titleEl = document.getElementById('title');
const fadeEl  = document.getElementById('fade');

let W, H;
function resize() {
  W = Math.floor(innerWidth / 2);
  H = Math.floor(innerHeight / 2);
  canvas.width = W; canvas.height = H;
  canvas.style.width  = innerWidth  + 'px';
  canvas.style.height = innerHeight + 'px';
  overlay.width  = innerWidth;
  overlay.height = innerHeight;
  gl.viewport(0, 0, W, H);
}
window.addEventListener('resize', resize);
resize();

// ── SHADER UTILS ────────────────────────────────────────────────────
function mkShader(t, src) {
  const s = gl.createShader(t);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    console.error(gl.getShaderInfoLog(s));
  return s;
}
function mkProg(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, mkShader(gl.VERTEX_SHADER,   vs));
  gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(p); return p;
}
function u(p, n) { return gl.getUniformLocation(p, n); }

// ── MATH ────────────────────────────────────────────────────────────
function m4() { return new Float32Array(16); }
function mul(a, b) {
  const r = m4();
  for (let i=0;i<4;i++) for (let j=0;j<4;j++) {
    let v=0; for (let k=0;k<4;k++) v += a[i+k*4]*b[k+j*4];
    r[i+j*4] = v;
  }
  return r;
}
function perspective(fov, asp, n, f) {
  const m=m4(), t=1/Math.tan(fov*.5);
  m[0]=t/asp; m[5]=t; m[10]=(f+n)/(n-f); m[11]=-1; m[14]=2*f*n/(n-f);
  return m;
}
function lookAt(eye, at) {
  const up=[0,1,0];
  const z=norm(sub3(eye,at)), x=norm(cross(up,z)), y=cross(z,x);
  const m=m4();
  m[0]=x[0]; m[4]=x[1]; m[8]=x[2];
  m[1]=y[0]; m[5]=y[1]; m[9]=y[2];
  m[2]=z[0]; m[6]=z[1]; m[10]=z[2];
  m[12]=-dot(x,eye); m[13]=-dot(y,eye); m[14]=-dot(z,eye); m[15]=1;
  return m;
}
function sub3(a,b){return[a[0]-b[0],a[1]-b[1],a[2]-b[2]];}
function dot(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2];}
function cross(a,b){return[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];}
function norm(v){const l=Math.hypot(...v)||1; return v.map(x=>x/l);}
function projectW(mvp, wx, wy, wz) {
  return [
    mvp[0]*wx + mvp[4]*wy + mvp[8]*wz  + mvp[12],
    mvp[1]*wx + mvp[5]*wy + mvp[9]*wz  + mvp[13],
    mvp[2]*wx + mvp[6]*wy + mvp[10]*wz + mvp[14],
    mvp[3]*wx + mvp[7]*wy + mvp[11]*wz + mvp[15],
  ];
}

// ── ROOM SHADER ─────────────────────────────────────────────────────
// Gouraud shading + PS1-style vertex jitter
const ROOM_VS = `
precision mediump float;
attribute vec3 a_pos;
attribute vec3 a_col;
uniform mat4 u_mvp;
uniform float u_jitter;
varying vec3 v_col;
void main(){
  vec4 clip = u_mvp * vec4(a_pos, 1.0);
  float g = 80.0 * u_jitter;
  clip.xy = floor(clip.xy * g + 0.5) / g;
  gl_Position = clip;
  v_col = a_col;
}`;
const ROOM_FS = `
precision mediump float;
varying vec3 v_col;
void main(){ gl_FragColor = vec4(v_col, 1.0); }`;
const roomProg = mkProg(ROOM_VS, ROOM_FS);

// ── SPRITE SHADER (billboard) ────────────────────────────────────────
const SPR_VS = `
precision mediump float;
attribute vec2 a_pos;
uniform vec2 u_ctr, u_sz;
varying vec2 v_uv;
void main(){
  v_uv = a_pos * .5 + .5;
  // u_sz.x is in NDC width, u_sz.y is in NDC height (already aspect-corrected)
  gl_Position = vec4(u_ctr + a_pos * u_sz, 0., 1.);
}`;
const SPR_FS = `
precision mediump float;
varying vec2 v_uv;
uniform sampler2D u_tex;
void main(){
  vec4 c = texture2D(u_tex, v_uv);
  if (c.a < .05) discard;
  gl_FragColor = c;
}`;
const sprProg = mkProg(SPR_VS, SPR_FS);

// ── PORTAL SHADER ────────────────────────────────────────────────────
const PRT_VS = `
precision mediump float;
attribute vec2 a_pos;
uniform vec2 u_ctr, u_sz;
varying vec2 v_uv;
void main(){ v_uv = a_pos; gl_Position = vec4(a_pos * u_sz + u_ctr, 0., 1.); }`;
const PRT_FS = `
precision mediump float;
varying vec2 v_uv;
uniform vec3 u_col;
uniform float u_pulse;
void main(){
  float d = length(v_uv);
  if (d > 1.0) discard;
  float rim  = smoothstep(1.0, .68, d);
  float core = smoothstep(.68,  .0, d) * .5;
  float a    = (rim * .95 + core) * (.6 + u_pulse * .4);
  gl_FragColor = vec4(u_col * a, a);
}`;
const prtProg = mkProg(PRT_VS, PRT_FS);

// shared quad
const QB = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, QB);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
function bindQuad(prog) {
  gl.bindBuffer(gl.ARRAY_BUFFER, QB);
  const a = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(a);
  gl.vertexAttribPointer(a, 2, gl.FLOAT, false, 0, 0);
}

// ── BLOB TEXTURE (Canvas 2D → WebGL texture) ─────────────────────────
const BC = 128;
const blobC = document.createElement('canvas');
blobC.width = blobC.height = BC;
const b2 = blobC.getContext('2d');
const blobTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, blobTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

function paintBlob(phase, moveAmt, facingX) {
  b2.clearRect(0, 0, BC, BC);
  const cx = BC/2, cy = BC * .46;
  const rx = 28, ry = 24;
  const bob  = Math.sin(phase * Math.PI * 2) * moveAmt * 3.5;
  const sqX  = 1 + Math.cos(phase * Math.PI * 2) * moveAmt * .06;
  const sqY  = 1 - Math.cos(phase * Math.PI * 2) * moveAmt * .06;

  // aura
  const aura = b2.createRadialGradient(cx, cy+bob, 0, cx, cy+bob, rx*1.8);
  aura.addColorStop(0, 'rgba(80,180,255,.15)');
  aura.addColorStop(1, 'rgba(0,0,0,0)');
  b2.fillStyle = aura;
  b2.beginPath(); b2.ellipse(cx, cy+bob, rx*1.8, ry*1.8, 0, 0, Math.PI*2); b2.fill();

  // body
  const bg = b2.createRadialGradient(cx-rx*.2, cy+bob-ry*.2, 2, cx, cy+bob, rx*1.1);
  bg.addColorStop(0,   'rgba(218,244,255,1)');
  bg.addColorStop(.3,  'rgba(105,192,255,1)');
  bg.addColorStop(.72, 'rgba(50,140,238,1)');
  bg.addColorStop(1,   'rgba(22,85,205,.9)');
  b2.fillStyle = bg;
  b2.beginPath(); b2.ellipse(cx, cy+bob, rx*sqX, ry*sqY, 0, 0, Math.PI*2); b2.fill();

  // specular
  const sp = b2.createRadialGradient(cx-9, cy+bob-9, 1, cx-9, cy+bob-9, 14);
  sp.addColorStop(0,   'rgba(255,255,255,.85)');
  sp.addColorStop(.6,  'rgba(255,255,255,.12)');
  sp.addColorStop(1,   'rgba(255,255,255,0)');
  b2.fillStyle = sp;
  b2.beginPath(); b2.ellipse(cx-9, cy+bob-9, 12, 8, -.3, 0, Math.PI*2); b2.fill();

  // eyes — shift left/right based on facing
  const esh = facingX * 5;
  const ey  = cy + bob - 5;
  [cx-7+esh, cx+7+esh].forEach(ex => {
    b2.fillStyle = 'rgba(6,18,60,.9)';
    b2.beginPath(); b2.ellipse(ex, ey, 3.2, 3.2, 0, 0, Math.PI*2); b2.fill();
    b2.fillStyle = 'rgba(255,255,255,.88)';
    b2.beginPath(); b2.ellipse(ex-1, ey-1, 1.1, 1.1, 0, 0, Math.PI*2); b2.fill();
  });

  // feet — below body, walk cycle
  const footY = cy + ry * sqY + bob + 16;
  const fsh   = facingX * 5;
  [
    { ox: -10 + fsh, ph: 0   },
    { ox:  10 + fsh, ph: .5  },
  ].forEach(f => {
    const fp   = (phase + f.ph) % 1;
    const lift = Math.sin(fp * Math.PI) * moveAmt * 8;
    const swX  = Math.sin(fp * Math.PI * 2) * moveAmt * 2.5;
    const fx   = cx + f.ox + swX;
    const fy   = footY - lift;

    const fg = b2.createRadialGradient(fx, fy, 0, fx, fy, 11);
    fg.addColorStop(0, 'rgba(130,210,255,.95)');
    fg.addColorStop(.5,'rgba(70,160,240,.5)');
    fg.addColorStop(1, 'rgba(40,120,220,0)');
    b2.fillStyle = fg;
    b2.beginPath(); b2.ellipse(fx, fy, 10, 8, 0, 0, Math.PI*2); b2.fill();
    b2.fillStyle = '#9dd8ff';
    b2.beginPath(); b2.ellipse(fx, fy, 6.5, 5, 0, 0, Math.PI*2); b2.fill();
  });
}

function uploadBlob(phase, moveAmt, facingX) {
  paintBlob(phase, moveAmt, facingX);
  gl.bindTexture(gl.TEXTURE_2D, blobTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, blobC);
}

// ── ROOM GEOMETRY ────────────────────────────────────────────────────
// Room dimensions — portals sit at z = PORTAL_Z on the back wall
const RW = 9, RH = 5, RD = 12;
const FLOOR_Y = -RH;
const PORTAL_Z = -(RD - 0.1); // just in front of back wall

function buildRoom(floorC, wallC, ceilC) {
  const verts = [];
  function quad(a, b, c, d, col) {
    [a,b,c, a,c,d].forEach(p => verts.push(...p, ...col));
  }
  // floor — slightly brighter
  const fl = floorC.map(v => Math.min(1, v * 1.15));
  quad([-RW, FLOOR_Y,-RD],[ RW, FLOOR_Y,-RD],[ RW, FLOOR_Y, RD],[-RW, FLOOR_Y, RD], fl);

  // ceiling — slightly dimmer
  const ce = ceilC.map(v => v * .85);
  quad([-RW, RH,-RD],[-RW, RH, RD],[ RW, RH, RD],[ RW, RH,-RD], ce);

  // back wall — lightest (what you walk toward)
  const bw = wallC.map(v => Math.min(1, v * 1.3));
  quad([-RW, FLOOR_Y,-RD],[ RW, FLOOR_Y,-RD],[ RW, RH,-RD],[-RW, RH,-RD], bw);

  // front wall (behind camera — rarely seen, keep dark)
  const fw = wallC.map(v => v * .55);
  quad([-RW, FLOOR_Y, RD],[-RW, RH, RD],[ RW, RH, RD],[ RW, FLOOR_Y, RD], fw);

  // left wall
  const lw = wallC.map((v,i) => i===0 ? Math.min(1,v*1.2) : v*.95);
  quad([-RW, FLOOR_Y,-RD],[-RW, RH,-RD],[-RW, RH, RD],[-RW, FLOOR_Y, RD], lw);

  // right wall — slightly darker for depth
  const rw = wallC.map(v => v * .78);
  quad([ RW, FLOOR_Y,-RD],[ RW, FLOOR_Y, RD],[ RW, RH, RD],[ RW, RH,-RD], rw);

  return { data: new Float32Array(verts), count: verts.length / 6 };
}

// ── SCENE DEFINITIONS ────────────────────────────────────────────────
// Portal collision radius — how close the player needs to get
const PORTAL_R = 1.8;

const SCENES = [
  {
    title:   'THE THRESHOLD',
    bg:      [.05, .07, .14],
    room:    buildRoom([.13,.14,.24], [.09,.10,.18], [.16,.15,.26]),
    portals: [
      { label:'ENTER VOID',    col:[.52,.68,1.0], wx:-4.5, next:1 },
      { label:'TRACE SIGNAL',  col:[1.0,.60,.42], wx: 4.5, next:2 },
    ],
  },
  {
    title:   'VERDANT ABYSS',
    bg:      [.03, .10, .07],
    room:    buildRoom([.09,.18,.13], [.07,.13,.09], [.12,.20,.16]),
    portals: [
      { label:'SURRENDER', col:[.42,.98,.68], wx:-4.5, next:2 },
      { label:'ASCEND',    col:[.78,.84,1.0], wx: 4.5, next:0 },
    ],
  },
  {
    title:   'BURNING MERIDIAN',
    bg:      [.14, .06, .03],
    room:    buildRoom([.22,.12,.07], [.17,.08,.04], [.25,.14,.09]),
    portals: [
      { label:'REMEMBER', col:[1.0,.70,.26], wx:-4.5, next:0 },
      { label:'FORGET',   col:[.58,.38,1.0], wx: 4.5, next:1 },
    ],
  },
  {
    title:   'CRIMSON MEMBRANE',
    bg:      [.12, .04, .09],
    room:    buildRoom([.20,.07,.15], [.16,.05,.11], [.24,.09,.19]),
    portals: [
      { label:'BECOME',   col:[1.0,.32,.52], wx:-4.5, next:1 },
      { label:'UNBECOME', col:[.32,.66,1.0], wx: 4.5, next:2 },
    ],
  },
];

// Upload room VBOs
SCENES.forEach(s => {
  s.vbo = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, s.vbo);
  gl.bufferData(gl.ARRAY_BUFFER, s.room.data, gl.STATIC_DRAW);
});

// ── GAME STATE ───────────────────────────────────────────────────────
let sceneIdx = 0;
let gTime    = 0;
let trans    = false;

const player = { x:0, z:1, facingX:0, moving:0, walkPhase:0 };
const keys   = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()))
    e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// ── CAMERA ───────────────────────────────────────────────────────────
function getVP() {
  const proj = perspective(Math.PI / 3.4, W / H, 0.1, 80);
  const eye  = [player.x, 7.5, player.z + 10];
  const at   = [player.x, 0,   player.z];
  return mul(proj, lookAt(eye, at));
}

// ── RENDER ROOM ──────────────────────────────────────────────────────
function renderRoom(s, mvp) {
  gl.useProgram(roomProg);
  gl.bindBuffer(gl.ARRAY_BUFFER, s.vbo);
  const aP = gl.getAttribLocation(roomProg, 'a_pos');
  const aC = gl.getAttribLocation(roomProg, 'a_col');
  gl.enableVertexAttribArray(aP); gl.enableVertexAttribArray(aC);
  gl.vertexAttribPointer(aP, 3, gl.FLOAT, false, 24, 0);
  gl.vertexAttribPointer(aC, 3, gl.FLOAT, false, 24, 12);
  gl.uniformMatrix4fv(u(roomProg, 'u_mvp'), false, mvp);
  gl.uniform1f(u(roomProg, 'u_jitter'), 1.0);
  gl.drawArrays(gl.TRIANGLES, 0, s.room.count);
}

// ── RENDER SHADOW ────────────────────────────────────────────────────
// Flat dark ellipse sitting on the floor directly under the blob
const shadowBuf = gl.createBuffer();
const N_SHADOW  = 28;
function renderShadow(mvp) {
  const verts = [];
  const fy = FLOOR_Y + 0.02; // just above floor to avoid z-fighting
  for (let i = 0; i < N_SHADOW; i++) {
    const a0 = (i   / N_SHADOW) * Math.PI * 2;
    const a1 = ((i+1) / N_SHADOW) * Math.PI * 2;
    verts.push(
      player.x,                       fy, player.z,            .08,.16,.38,
      player.x + Math.cos(a0) * .75,  fy, player.z + Math.sin(a0)*.38, .08,.16,.38,
      player.x + Math.cos(a1) * .75,  fy, player.z + Math.sin(a1)*.38, .08,.16,.38,
    );
  }
  gl.bindBuffer(gl.ARRAY_BUFFER, shadowBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(verts), gl.DYNAMIC_DRAW);

  gl.useProgram(roomProg);
  const aP = gl.getAttribLocation(roomProg, 'a_pos');
  const aC = gl.getAttribLocation(roomProg, 'a_col');
  gl.enableVertexAttribArray(aP); gl.enableVertexAttribArray(aC);
  gl.vertexAttribPointer(aP, 3, gl.FLOAT, false, 24, 0);
  gl.vertexAttribPointer(aC, 3, gl.FLOAT, false, 24, 12);
  gl.uniformMatrix4fv(u(roomProg, 'u_mvp'), false, mvp);
  gl.uniform1f(u(roomProg, 'u_jitter'), 0.0);
  gl.drawArrays(gl.TRIANGLES, 0, N_SHADOW * 3);
}

// ── RENDER BLOB ──────────────────────────────────────────────────────
function renderBlob(mvp) {
  uploadBlob(player.walkPhase, player.moving, player.facingX);

  // Project the player's feet position (y=FLOOR_Y) to get screen anchor
  const clip = projectW(mvp, player.x, FLOOR_Y, player.z);
  if (clip[3] < 0.05) return;

  const w = clip[3]; // perspective divide
  // NDC position of feet
  const nx = clip[0] / w;
  const ny = clip[1] / w;

  // Size: world-unit blob radius ~1.2, convert to NDC
  // In NDC, 1 unit = half screen. We derive size from how big 1 world unit
  // appears at this depth using the projection.
  const proj = perspective(Math.PI / 3.4, W / H, 0.1, 80);
  const scaleNDC = proj[5] / w; // proj[5] = f (y scale), divide by depth
  const blobRadius = 1.2;
  // sx in NDC x, sy in NDC y (aspect-corrected)
  const sy = scaleNDC * blobRadius;
  const sx = sy * (H / W); // correct for aspect

  // Center billboard at feet, shift up by half blob height
  const cy_ndc = ny + sy;

  gl.useProgram(sprProg);
  bindQuad(sprProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, blobTex);
  gl.uniform1i(u(sprProg, 'u_tex'), 0);
  gl.uniform2f(u(sprProg, 'u_ctr'), nx, cy_ndc);
  gl.uniform2f(u(sprProg, 'u_sz'),  sx, sy);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.disable(gl.BLEND);
}

// ── RENDER PORTALS (WebGL oval) ──────────────────────────────────────
function renderPortals(s, mvp) {
  gl.useProgram(prtProg);
  bindQuad(prtProg);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

  s.portals.forEach(p => {
    // Portal sits at mid-wall height, z = back wall
    const clip = projectW(mvp, p.wx, 0.5, PORTAL_Z);
    if (clip[3] < 0.05) return;
    const nx = clip[0]/clip[3], ny = clip[1]/clip[3];
    const depth = Math.max(clip[3], .5);
    const sx = .38/depth, sy = sx*(W/H)*2.2; // tall oval
    const pulse = Math.sin(gTime*2.2 + p.wx) * .5 + .5;
    gl.uniform2f(u(prtProg, 'u_ctr'), nx, ny);
    gl.uniform2f(u(prtProg, 'u_sz'),  sx, sy);
    gl.uniform3fv(u(prtProg, 'u_col'), p.col);
    gl.uniform1f(u(prtProg, 'u_pulse'), pulse);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  });
  gl.disable(gl.BLEND);
}

// ── OVERLAY LABELS + SCENE TITLE ─────────────────────────────────────
function renderOverlay(s, mvp) {
  oc.clearRect(0, 0, overlay.width, overlay.height);

  s.portals.forEach(p => {
    const clip = projectW(mvp, p.wx, 0.5, PORTAL_Z);
    if (clip[3] < .05) return;
    const sx = (clip[0]/clip[3] * .5 + .5) * overlay.width;
    const sy = (1 - (clip[1]/clip[3] * .5 + .5)) * overlay.height;

    // label above portal
    const c = p.col;
    oc.fillStyle = `rgba(${Math.round(c[0]*255)},${Math.round(c[1]*255)},${Math.round(c[2]*255)},.88)`;
    oc.font = '10px Courier New';
    oc.letterSpacing = '.15em';
    oc.textAlign = 'center';

    // subtle glitch jitter on label
    const jx = (Math.random()-.5)*1.5, jy = (Math.random()-.5)*1.5;
    oc.fillText(p.label, sx+jx, sy - 44 + jy);

    // proximity prompt
    const dist = Math.hypot(player.x - p.wx, player.z - PORTAL_Z);
    if (dist < PORTAL_R * 1.5) {
      const a = Math.max(0, 1 - dist / (PORTAL_R * 1.5));
      oc.fillStyle = `rgba(255,255,255,${a * .7})`;
      oc.font = '9px Courier New';
      oc.fillText('[ enter ]', sx, sy + 50);
    }
  });
}

// ── TRANSITION ───────────────────────────────────────────────────────
function goToScene(next) {
  if (trans) return;
  trans = true;
  fadeEl.style.opacity = '1';
  setTimeout(() => {
    sceneIdx = next;
    player.x = 0; player.z = 1; player.facingX = 0;
    // show scene title
    titleEl.style.opacity = '0';
    setTimeout(() => {
      titleEl.textContent = SCENES[sceneIdx].title;
      fadeEl.style.opacity = '0';
      titleEl.style.opacity = '1';
      setTimeout(() => {
        titleEl.style.opacity = '0';
        trans = false;
      }, 2400);
    }, 400);
  }, 750);
}

// ── INIT ─────────────────────────────────────────────────────────────
titleEl.textContent = SCENES[0].title;
titleEl.style.opacity = '1';
setTimeout(() => titleEl.style.opacity = '0', 2400);

// ── MAIN LOOP ────────────────────────────────────────────────────────
let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 1000, .05);
  last = ts; gTime += dt;

  // movement — pure world-space, camera never rotates
  const SPEED = 4.5;
  let dx = 0, dz = 0;
  if (!trans) {
    if (keys['w'] || keys['arrowup'])    dz -= 1;
    if (keys['s'] || keys['arrowdown'])  dz += 1;
    if (keys['a'] || keys['arrowleft'])  dx -= 1;
    if (keys['d'] || keys['arrowright']) dx += 1;
  }
  const mv = dx !== 0 || dz !== 0;
  if (mv) {
    const len = Math.hypot(dx, dz);
    player.x += (dx/len) * SPEED * dt;
    player.z += (dz/len) * SPEED * dt;
    player.facingX = dx / len;
  }
  player.x = Math.max(-RW + .5, Math.min(RW - .5, player.x));
  player.z = Math.max(-RD + .5, Math.min(RD - .5, player.z));
  player.moving = mv
    ? Math.min(1, player.moving + dt * 6)
    : Math.max(0, player.moving - dt * 9);
  if (mv) player.walkPhase = (player.walkPhase + dt * 3) % 1;

  // portal collision — check XZ distance to each portal
  if (!trans) {
    SCENES[sceneIdx].portals.forEach(p => {
      const dist = Math.hypot(player.x - p.wx, player.z - PORTAL_Z);
      if (dist < PORTAL_R) goToScene(p.next);
    });
  }

  // ── RENDER ──
  const s = SCENES[sceneIdx];
  gl.clearColor(s.bg[0], s.bg[1], s.bg[2], 1);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);

  const mvp = getVP();
  renderRoom(s, mvp);
  renderShadow(mvp);
  renderPortals(s, mvp);
  renderBlob(mvp);
  renderOverlay(s, mvp);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
