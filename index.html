
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Between</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; }
  canvas { display:block; image-rendering:pixelated; }
  #hud {
    position:fixed; bottom:18px; left:50%;
    transform:translateX(-50%);
    color:rgba(180,210,255,0.35);
    font:10px/1 'Courier New',monospace;
    letter-spacing:0.22em; text-transform:uppercase;
    pointer-events:none;
  }
  #title {
    position:fixed; top:30px; left:50%;
    transform:translateX(-50%);
    color:rgba(180,210,255,0.6);
    font:11px/1 'Courier New',monospace;
    letter-spacing:0.45em; text-transform:uppercase;
    pointer-events:none; transition:opacity 1.8s; white-space:nowrap;
  }
  #fade {
    position:fixed; inset:0; background:#000;
    opacity:0; pointer-events:none; z-index:20;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">WASD / Arrow keys to walk · walk into a portal</div>
<div id="title"></div>
<div id="fade"></div>
<script>
'use strict';

// ── GL ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { antialias: false });
const fadeEl  = document.getElementById('fade');
const titleEl = document.getElementById('title');

let W, H;
function resize() {
  W = Math.floor(window.innerWidth  / 2);
  H = Math.floor(window.innerHeight / 2);
  canvas.width = W; canvas.height = H;
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
  gl.viewport(0, 0, W, H);
}
window.addEventListener('resize', resize);
resize();

// ── SHADER UTILS ────────────────────────────────────────────────────
function mkShader(t, src) {
  const s = gl.createShader(t);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s), src);
  return s;
}
function mkProg(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, mkShader(gl.VERTEX_SHADER, vs));
  gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(p); return p;
}
function u(p, n) { return gl.getUniformLocation(p, n); }

// ── MATH ────────────────────────────────────────────────────────────
function m4() { return new Float32Array(16); }
function ident(m) { m.fill(0); m[0]=m[5]=m[10]=m[15]=1; return m; }
function mul(a, b) {
  const r = m4();
  for (let i=0;i<4;i++) for(let j=0;j<4;j++) {
    let v=0; for(let k=0;k<4;k++) v+=a[i+k*4]*b[k+j*4]; r[i+j*4]=v;
  }
  return r;
}
function perspective(fov, asp, n, f) {
  const m=m4(), t=1/Math.tan(fov*.5);
  m[0]=t/asp; m[5]=t; m[10]=(f+n)/(n-f); m[11]=-1; m[14]=2*f*n/(n-f);
  return m;
}
function lookAt(eye, at, up) {
  const z=norm(sub3(eye,at)), x=norm(cross(up,z)), y=cross(z,x);
  const m=m4();
  m[0]=x[0]; m[4]=x[1]; m[8]=x[2];
  m[1]=y[0]; m[5]=y[1]; m[9]=y[2];
  m[2]=z[0]; m[6]=z[1]; m[10]=z[2];
  m[12]=-dot(x,eye); m[13]=-dot(y,eye); m[14]=-dot(z,eye); m[15]=1;
  return m;
}
function sub3(a,b){return[a[0]-b[0],a[1]-b[1],a[2]-b[2]];}
function dot(a,b){return a[0]*b[0]+a[1]*b[1]+a[2]*b[2];}
function cross(a,b){return[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];}
function norm(v){const l=Math.hypot(...v)||1;return v.map(x=>x/l);}

// ── SCENE SHADER (Gouraud, vertex wobble) ───────────────────────────
const ROOM_VS = `
precision mediump float;
attribute vec3 a_pos;
attribute vec3 a_col;
uniform mat4 u_mvp;
uniform float u_wobble;
varying vec3 v_col;
void main(){
  vec4 clip = u_mvp * vec4(a_pos,1.0);
  float p = 48.0 * u_wobble;
  clip.xy = floor(clip.xy*p+0.5)/p;
  gl_Position = clip;
  v_col = a_col;
}`;
const ROOM_FS = `
precision mediump float;
varying vec3 v_col;
void main(){ gl_FragColor = vec4(v_col,1.0); }`;
const roomProg = mkProg(ROOM_VS, ROOM_FS);

// ── SPRITE SHADER ───────────────────────────────────────────────────
const SPR_VS = `
precision mediump float;
attribute vec2 a_pos;
uniform vec2 u_ctr, u_sz;
varying vec2 v_uv;
void main(){
  v_uv = a_pos*.5+.5;
  gl_Position = vec4(a_pos*u_sz+u_ctr,0.,1.);
}`;
const SPR_FS = `
precision mediump float;
varying vec2 v_uv;
uniform sampler2D u_tex;
void main(){
  vec4 c=texture2D(u_tex,v_uv);
  if(c.a<.05) discard;
  gl_FragColor=c;
}`;
const sprProg = mkProg(SPR_VS, SPR_FS);

// ── PORTAL SHADER ───────────────────────────────────────────────────
const PRT_VS = `
precision mediump float;
attribute vec2 a_pos;
uniform vec2 u_ctr,u_sz;
varying vec2 v_uv;
void main(){ v_uv=a_pos; gl_Position=vec4(a_pos*u_sz+u_ctr,0.,1.); }`;
const PRT_FS = `
precision mediump float;
varying vec2 v_uv;
uniform vec3 u_col;
uniform float u_pulse;
void main(){
  float d=length(v_uv);
  if(d>1.0) discard;
  float rim=smoothstep(1.0,.72,d);
  float core=smoothstep(.72,.0,d)*.55;
  float a=(rim*.9+core)*(0.65+u_pulse*.35);
  gl_FragColor=vec4(u_col*a,a);
}`;
const prtProg = mkProg(PRT_VS, PRT_FS);

// shared quad buffer
const QB = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, QB);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);

function bindQuadAttr(prog) {
  gl.bindBuffer(gl.ARRAY_BUFFER, QB);
  const a = gl.getAttribLocation(prog,'a_pos');
  gl.enableVertexAttribArray(a);
  gl.vertexAttribPointer(a,2,gl.FLOAT,false,0,0);
}

// ── BLOB CANVAS ─────────────────────────────────────────────────────
const BC = 128, blobC = document.createElement('canvas');
blobC.width = blobC.height = BC;
const b2d = blobC.getContext('2d');
const blobTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, blobTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

function paintBlob(phase, moveAmt, turnDir) {
  // turnDir: -1 left, 0 forward, 1 right — shifts eyes and feet
  b2d.clearRect(0,0,BC,BC);
  const cx=BC/2, cy=BC*.54;
  const rx=30, ry=26;
  const bob = Math.sin(phase*Math.PI*2)*moveAmt*4;
  const sqX = 1 + Math.cos(phase*Math.PI*2)*moveAmt*.06;
  const sqY = 1 - Math.cos(phase*Math.PI*2)*moveAmt*.06;

  // outer aura — drawn first so feet/body render on top
  const aura = b2d.createRadialGradient(cx,cy+bob,0,cx,cy+bob,rx*1.7);
  aura.addColorStop(0,'rgba(80,180,255,.18)');
  aura.addColorStop(.5,'rgba(50,140,255,.08)');
  aura.addColorStop(1,'rgba(20,80,255,0)');
  b2d.fillStyle=aura;
  b2d.beginPath(); b2d.ellipse(cx,cy+bob,rx*1.7,ry*sqY*1.7,0,0,Math.PI*2); b2d.fill();

  // body
  const bg = b2d.createRadialGradient(cx-rx*.22,cy+bob-ry*.2,2,cx,cy+bob,rx*1.1);
  bg.addColorStop(0,'rgba(215,242,255,1)');
  bg.addColorStop(.3,'rgba(110,195,255,1)');
  bg.addColorStop(.7,'rgba(55,145,240,1)');
  bg.addColorStop(1,'rgba(25,90,210,.88)');
  b2d.fillStyle=bg;
  b2d.beginPath(); b2d.ellipse(cx,cy+bob,rx*sqX,ry*sqY,0,0,Math.PI*2); b2d.fill();

  // specular
  const sp = b2d.createRadialGradient(cx-10,cy+bob-10,1,cx-10,cy+bob-10,15);
  sp.addColorStop(0,'rgba(255,255,255,.82)');
  sp.addColorStop(.55,'rgba(255,255,255,.15)');
  sp.addColorStop(1,'rgba(255,255,255,0)');
  b2d.fillStyle=sp;
  b2d.beginPath(); b2d.ellipse(cx-10,cy+bob-10,13,9,-.35,0,Math.PI*2); b2d.fill();

  // shadow on ground below feet
  b2d.save();
  b2d.globalAlpha=.13;
  const sg=b2d.createRadialGradient(cx,cy+ry*sqY+bob+30,0,cx,cy+ry*sqY+bob+30,rx*.9);
  sg.addColorStop(0,'rgba(40,100,200,.6)');
  sg.addColorStop(1,'rgba(40,100,200,0)');
  b2d.fillStyle=sg;
  b2d.beginPath(); b2d.ellipse(cx,cy+ry*sqY+bob+32,rx*.85,6,0,0,Math.PI*2); b2d.fill();
  b2d.restore();

  // feet — drawn AFTER body so they visually sit below and in front
  const fShift = turnDir * 6;
  [
    { ox: -11+fShift, ph: 0   },
    { ox:  11+fShift, ph: .5  }
  ].forEach(f => {
    const fp = ((phase + f.ph) % 1);
    const lift = Math.sin(fp*Math.PI)*moveAmt*8;
    const swingX = Math.sin(fp*Math.PI*2)*3*moveAmt;
    const fx = cx + f.ox + swingX;
    // feet sit below the body — cy + ry is bottom edge, add clear offset
    const fy = cy + ry*sqY + bob + 18 - lift;

    const fg = b2d.createRadialGradient(fx,fy,0,fx,fy,12);
    fg.addColorStop(0,'rgba(130,210,255,.95)');
    fg.addColorStop(.5,'rgba(70,160,240,.5)');
    fg.addColorStop(1,'rgba(40,120,220,0)');
    b2d.fillStyle=fg;
    b2d.beginPath(); b2d.ellipse(fx,fy,11,9,0,0,Math.PI*2); b2d.fill();
    b2d.fillStyle='#9dd8ff';
    b2d.beginPath(); b2d.ellipse(fx,fy,7,5,0,0,Math.PI*2); b2d.fill();
  });

  // eyes — shift with turn direction
  const eyeShift = turnDir * 5;
  const eyeY = cy + bob - 5;
  [cx-8+eyeShift, cx+8+eyeShift].forEach(ex => {
    b2d.fillStyle='rgba(8,22,70,.88)';
    b2d.beginPath(); b2d.ellipse(ex,eyeY,3.5,3.5,0,0,Math.PI*2); b2d.fill();
    b2d.fillStyle='rgba(255,255,255,.9)';
    b2d.beginPath(); b2d.ellipse(ex-1,eyeY-1,1.2,1.2,0,0,Math.PI*2); b2d.fill();
  });
}

function uploadBlob(phase, moveAmt, turnDir) {
  paintBlob(phase, moveAmt, turnDir);
  gl.bindTexture(gl.TEXTURE_2D, blobTex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,blobC);
}

// ── ROOM GEOMETRY ───────────────────────────────────────────────────
function buildRoom(floor, wall, ceil) {
  const verts=[];
  function quad(a,b,c,d,col){
    [a,b,c,a,c,d].forEach(p=>verts.push(...p,...col));
  }
  const W=11, H=5, D=18;
  quad([-W,-H,-D],[ W,-H,-D],[ W,-H, D],[-W,-H, D], floor);
  quad([-W, H,-D],[-W, H, D],[ W, H, D],[ W, H,-D], ceil);
  quad([-W,-H,-D],[ W,-H,-D],[ W, H,-D],[-W, H,-D], wall);
  const wL=wall.map((v,i)=>i===0?v*1.12:v*.9);
  quad([-W,-H,-D],[-W, H,-D],[-W, H, D],[-W,-H, D], wL);
  const wR=wall.map(v=>v*.82);
  quad([ W,-H,-D],[ W,-H, D],[ W, H, D],[ W, H,-D], wR);
  return { data: new Float32Array(verts), count: verts.length/6 };
}

// ── SCENE DEFINITIONS ───────────────────────────────────────────────
const SCENES = [
  {
    title: 'The Threshold',
    bg: [.07,.07,.13],
    room: buildRoom([.13,.13,.21],[.09,.09,.17],[.17,.15,.25]),
    portals: [
      { label:'Dissolution', col:[.55,.70,1.0], wx:-4 },
      { label:'Ignition',    col:[1.0,.62,.45], wx: 4 },
    ],
    next:[1,2]
  },
  {
    title: 'The Verdant Abyss',
    bg: [.05,.11,.09],
    room: buildRoom([.09,.17,.13],[.07,.13,.09],[.13,.21,.17]),
    portals: [
      { label:'Surrender', col:[.44,1.0,.71], wx:-4 },
      { label:'Ascend',    col:[.78,.84,1.0], wx: 4 },
    ],
    next:[3,0]
  },
  {
    title: 'The Burning Meridian',
    bg: [.13,.06,.03],
    room: buildRoom([.21,.11,.07],[.17,.08,.04],[.25,.15,.09]),
    portals: [
      { label:'Remember', col:[1.0,.72,.28], wx:-4 },
      { label:'Forget',   col:[.60,.40,1.0], wx: 4 },
    ],
    next:[0,3]
  },
  {
    title: 'The Crimson Membrane',
    bg: [.13,.05,.09],
    room: buildRoom([.21,.07,.15],[.17,.05,.11],[.25,.09,.19]),
    portals: [
      { label:'Become',   col:[1.0,.34,.54], wx:-4 },
      { label:'Unbecome', col:[.34,.68,1.0], wx: 4 },
    ],
    next:[1,2]
  }
];

// Upload room buffers
SCENES.forEach(s => {
  s.buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, s.buf);
  gl.bufferData(gl.ARRAY_BUFFER, s.room.data, gl.STATIC_DRAW);
});

// ── GAME STATE ──────────────────────────────────────────────────────
let sceneIdx = 0;
let gTime    = 0;
let trans    = false;

const player = { x:0, z:2, moving:0, walkPhase:0, facingX:0, facingZ:-1 };
const keys   = {};
window.addEventListener('keydown', e=>{ keys[e.key]=true;  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault(); });
window.addEventListener('keyup',   e=>{ keys[e.key]=false; });

// ── PROJECTION — fixed camera from above-behind, follows player ──────
const PROJ = perspective(Math.PI/3.5, 1, 0.1, 80);

// Camera is fixed in angle — sits behind and above, always looking
// at the player. It slides to follow but never rotates.
const CAM_OFFSET = [0, 7, 9]; // fixed world-space offset from player

function getVP() {
  const eye = [
    player.x + CAM_OFFSET[0],
    CAM_OFFSET[1],
    player.z + CAM_OFFSET[2],
  ];
  const at = [player.x, 0, player.z];
  return mul(PROJ, lookAt(eye, at, [0,1,0]));
}

function projectWorld(mvp, wx,wy,wz) {
  const c=[
    mvp[0]*wx+mvp[4]*wy+mvp[8]*wz +mvp[12],
    mvp[1]*wx+mvp[5]*wy+mvp[9]*wz +mvp[13],
    mvp[2]*wx+mvp[6]*wy+mvp[10]*wz+mvp[14],
    mvp[3]*wx+mvp[7]*wy+mvp[11]*wz+mvp[15],
  ];
  return c;
}

// ── RENDER ROOM ─────────────────────────────────────────────────────
function renderRoom(s, mvp) {
  gl.useProgram(roomProg);
  gl.bindBuffer(gl.ARRAY_BUFFER, s.buf);
  const aP=gl.getAttribLocation(roomProg,'a_pos');
  const aC=gl.getAttribLocation(roomProg,'a_col');
  gl.enableVertexAttribArray(aP); gl.enableVertexAttribArray(aC);
  gl.vertexAttribPointer(aP,3,gl.FLOAT,false,24,0);
  gl.vertexAttribPointer(aC,3,gl.FLOAT,false,24,12);
  gl.uniformMatrix4fv(u(roomProg,'u_mvp'),false,mvp);
  gl.uniform1f(u(roomProg,'u_wobble'),1.0);
  gl.drawArrays(gl.TRIANGLES,0,s.room.count);
}

// ── RENDER SHADOW (flat ellipse on floor, rendered as 3D geometry) ───
function renderShadow(mvp) {
  // Build a flat oval of triangles at y=floor level under the player
  const verts = [];
  const N = 24;
  const sx = 0.7, sz = 0.35; // oval shape
  const fy = -4.85; // floor y
  for(let i=0;i<N;i++){
    const a0 = (i/N)*Math.PI*2, a1 = ((i+1)/N)*Math.PI*2;
    verts.push(player.x, fy, player.z);
    verts.push(player.x + Math.cos(a0)*sx, fy, player.z + Math.sin(a0)*sz);
    verts.push(player.x + Math.cos(a1)*sx, fy, player.z + Math.sin(a1)*sz);
  }
  const col = [0.12, 0.25, 0.55]; // dark blue tint shadow
  const data = [];
  for(let i=0;i<verts.length;i+=3) data.push(verts[i],verts[i+1],verts[i+2],...col);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(data), gl.DYNAMIC_DRAW);

  gl.useProgram(roomProg);
  const aP=gl.getAttribLocation(roomProg,'a_pos');
  const aC=gl.getAttribLocation(roomProg,'a_col');
  gl.enableVertexAttribArray(aP); gl.enableVertexAttribArray(aC);
  gl.vertexAttribPointer(aP,3,gl.FLOAT,false,24,0);
  gl.vertexAttribPointer(aC,3,gl.FLOAT,false,24,12);
  gl.uniformMatrix4fv(u(roomProg,'u_mvp'),false,mvp);
  gl.uniform1f(u(roomProg,'u_wobble'),0.0); // no wobble on shadow
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  gl.drawArrays(gl.TRIANGLES, 0, N*3);
  gl.disable(gl.BLEND);
  gl.deleteBuffer(buf);
}

// ── RENDER BLOB ─────────────────────────────────────────────────────
function renderBlob(mvp) {
  // facing direction: left=-1, right=1 based on world X movement
  const td = player.facingX > 0.2 ? 1 : player.facingX < -0.2 ? -1 : 0;
  uploadBlob(player.walkPhase, player.moving, td);

  const clip = projectWorld(mvp, player.x, -0.15, player.z);
  if (clip[3] < 0.05) return;
  const nx = clip[0]/clip[3], ny = clip[1]/clip[3];
  const depth = Math.max(clip[3], 0.5);
  const sx = 1.15/depth, sy = sx*(W/H);

  gl.useProgram(sprProg);
  bindQuadAttr(sprProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, blobTex);
  gl.uniform1i(u(sprProg,'u_tex'),0);
  gl.uniform2f(u(sprProg,'u_ctr'), nx, ny + sy*.45);
  gl.uniform2f(u(sprProg,'u_sz'),  sx, sy);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  gl.disable(gl.BLEND);
}

// ── RENDER PORTALS ──────────────────────────────────────────────────
function renderPortals(s, mvp) {
  gl.useProgram(prtProg);
  bindQuadAttr(prtProg);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

  s.portals.forEach(p => {
    const clip = projectWorld(mvp, p.wx, 0.4, -7);
    if (clip[3] < 0.05) return;
    const nx=clip[0]/clip[3], ny=clip[1]/clip[3];
    const depth=Math.max(clip[3],.5);
    // small oval: narrower x, taller y
    const sx = 0.42/depth, sy = sx*(W/H)*1.9;
    const pulse = Math.sin(gTime*2.4+p.wx)*.5+.5;
    gl.uniform2f(u(prtProg,'u_ctr'),nx,ny);
    gl.uniform2f(u(prtProg,'u_sz'),sx,sy);
    gl.uniform3fv(u(prtProg,'u_col'),p.col);
    gl.uniform1f(u(prtProg,'u_pulse'),pulse);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  });
  gl.disable(gl.BLEND);
}

// ── PORTAL LABELS ───────────────────────────────────────────────────
const lbC = document.createElement('canvas');
lbC.style.cssText='position:fixed;top:0;left:0;pointer-events:none;z-index:5;';
document.body.appendChild(lbC);
const lx = lbC.getContext('2d');

function renderLabels(s, mvp) {
  lbC.width=window.innerWidth; lbC.height=window.innerHeight;
  lx.clearRect(0,0,lbC.width,lbC.height);
  s.portals.forEach(p => {
    const clip=projectWorld(mvp,p.wx,0.4,-7);
    if(clip[3]<.05) return;
    const sx=(clip[0]/clip[3]*.5+.5)*window.innerWidth;
    const sy=(1-(clip[1]/clip[3]*.5+.5))*window.innerHeight;
    const c=p.col;
    lx.fillStyle=`rgba(${Math.round(c[0]*255)},${Math.round(c[1]*255)},${Math.round(c[2]*255)},.85)`;
    lx.font='10px Courier New';
    lx.textAlign='center';
    lx.fillText(p.label.toUpperCase(), sx, sy-32);
    const dx=player.x-p.wx, dz=player.z-(-7);
    const dist=Math.hypot(dx,dz);
    if(dist<2.6){
      const a=Math.max(0,1-dist/2.6);
      lx.fillStyle=`rgba(255,255,255,${a*.75})`;
      lx.fillText('[ enter ]',sx,sy+38);
    }
  });
}

// ── TRANSITION ──────────────────────────────────────────────────────
function goToScene(next) {
  if(trans) return; trans=true;
  fadeEl.style.transition='opacity .65s ease-in'; fadeEl.style.opacity='1';
  setTimeout(()=>{
    sceneIdx=next; player.x=0; player.z=2;
    player.facingX=0; player.facingZ=-1;
    titleEl.style.opacity='0';
    setTimeout(()=>{
      fadeEl.style.transition='opacity 1.1s ease-out'; fadeEl.style.opacity='0';
      titleEl.textContent=SCENES[sceneIdx].title; titleEl.style.opacity='1';
      setTimeout(()=>{ titleEl.style.opacity='0'; trans=false; },2600);
    },320);
  },720);
}

// ── INIT ────────────────────────────────────────────────────────────
titleEl.textContent=SCENES[0].title; titleEl.style.opacity='1';
setTimeout(()=>titleEl.style.opacity='0',2600);

// ── LOOP ────────────────────────────────────────────────────────────
let last=0;
function loop(ts) {
  const dt=Math.min((ts-last)/1000,.05); last=ts; gTime+=dt;

  // input — world-space movement, camera never rotates
  const SPEED = 4.2;
  let dx = 0, dz = 0;
  if(!trans){
    // W/S = forward/back in world Z (away from camera / toward camera)
    if(keys['ArrowUp']   ||keys['w']||keys['W']) dz -= 1;
    if(keys['ArrowDown'] ||keys['s']||keys['S']) dz += 1;
    // A/D = left/right in world X
    if(keys['ArrowLeft'] ||keys['a']||keys['A']) dx -= 1;
    if(keys['ArrowRight']||keys['d']||keys['D']) dx += 1;
  }
  const mv = dx !== 0 || dz !== 0;
  if(mv){
    const len = Math.hypot(dx, dz);
    player.x += (dx/len)*SPEED*dt;
    player.z += (dz/len)*SPEED*dt;
    player.facingX = dx/len;
    player.facingZ = dz/len;
  }
  player.x = Math.max(-8.5, Math.min(8.5, player.x));
  player.z = Math.max(-7,   Math.min(7,   player.z));
  player.moving = mv
    ? Math.min(1, player.moving+dt*6)
    : Math.max(0, player.moving-dt*9);
  if(mv) player.walkPhase=(player.walkPhase+dt*3)%1;

  // portal collision
  if(!trans) SCENES[sceneIdx].portals.forEach((p,i)=>{
    if(Math.hypot(player.x-p.wx, player.z-(-7))<1.15)
      goToScene(SCENES[sceneIdx].next[i]);
  });

  // render
  const s=SCENES[sceneIdx];
  gl.clearColor(s.bg[0],s.bg[1],s.bg[2],1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);

  const mvp=getVP();
  renderRoom(s, mvp);
  renderPortals(s, mvp);
  renderShadow(mvp);
  renderBlob(mvp);
  renderLabels(s, mvp);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
